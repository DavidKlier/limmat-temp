name: Fetch Limmat Temperature

on:
  schedule:
    - cron: '0 8 * * *'  # 10:00 Uhr CEST (UTC+2, Mai–Sep)
  workflow_dispatch:      # manueller Start möglich

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python LimmatTempFetcher.py
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER: ${{ secrets.ONEDRIVE_USER }}

      - name: Commit JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add limmat_temp.json
          git diff --cached --quiet || git commit -m "Update limmat_temp.json"
          git push
