name: Fetch Limmat Temperature

on:
  schedule:
    - cron: '0 8 * * *'  # 10:00 Uhr CEST (UTC+2, Mai–Sep)
  workflow_dispatch:      # manueller Start möglich

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch and upload to OneDrive
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          ONEDRIVE_USER: ${{ secrets.ONEDRIVE_USER }}
        run: |
          python3 - << 'EOF'
          import requests, json, os
          import xml.etree.ElementTree as ET
          from datetime import datetime

          xml_url = "https://www.stadt-zuerich.ch/stzh/bathdatadownload"
          relevante_poiids = ["flb6939", "flb8803"]

          response = requests.get(xml_url)
          response.raise_for_status()
          root = ET.fromstring(response.content)
          ergebnisse = []

          for bad in root.findall(".//bath"):
              poiid = bad.findtext("poiid", "").strip()
              if poiid in relevante_poiids:
                  name = bad.findtext("title", "").strip()
                  temperature = bad.findtext("temperatureWater", "").strip()
                  timestamp = bad.findtext("dateModified", "").strip()
                  ergebnisse.append({
                      "name": name,
                      "temperature": f"{temperature} °C" if temperature else "n/a",
                      "timestamp": timestamp
                  })

          output = json.dumps({
              "abgerufen_am": datetime.now().isoformat(),
              "daten": ergebnisse
          }, ensure_ascii=False, indent=2)

          print("✅ Temperaturdaten abgerufen.")

          token_response = requests.post(
              f"https://login.microsoftonline.com/{os.environ['AZURE_TENANT_ID']}/oauth2/v2.0/token",
              data={
                  "grant_type": "refresh_token",
                  "client_id": os.environ["AZURE_CLIENT_ID"],
                  "refresh_token": os.environ["AZURE_REFRESH_TOKEN"],
                  "scope": "https://graph.microsoft.com/Files.ReadWrite offline_access",
              },
          )
          token_response.raise_for_status()
          access_token = token_response.json()["access_token"]

          upload_response = requests.put(
              f"https://graph.microsoft.com/v1.0/me/drive/root:/Coding/limmat_temp.json:/content",
              headers={
                  "Authorization": f"Bearer {access_token}",
                  "Content-Type": "application/json",
              },
              data=output.encode("utf-8"),
          )
          upload_response.raise_for_status()
          print("✅ OneDrive-Upload erfolgreich.")
          EOF
