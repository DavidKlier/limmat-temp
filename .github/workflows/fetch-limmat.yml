name: Fetch Limmat Temperature

on:
  schedule:
    - cron: '0 8 * * *'  # 10:00 Uhr CEST (UTC+2, Mai–Sep)
  workflow_dispatch:      # manueller Start möglich
  push:
    branches: [main]     # temporär zum Testen

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch and send temperature data
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
        run: |
          python3 - << 'EOF'
          import requests, json, smtplib, os
          import xml.etree.ElementTree as ET
          from datetime import datetime
          from email.mime.text import MIMEText

          xml_url = "https://www.stadt-zuerich.ch/stzh/bathdatadownload"
          relevante_poiids = ["flb6939", "flb8803"]

          response = requests.get(xml_url)
          response.raise_for_status()
          root = ET.fromstring(response.content)
          ergebnisse = []

          for bad in root.findall(".//bath"):
              poiid = bad.findtext("poiid", "").strip()
              if poiid in relevante_poiids:
                  name = bad.findtext("title", "").strip()
                  temperature = bad.findtext("temperatureWater", "").strip()
                  timestamp = bad.findtext("dateModified", "").strip()
                  ergebnisse.append({
                      "name": name,
                      "temperature": f"{temperature} °C" if temperature else "n/a",
                      "timestamp": timestamp
                  })

          output = json.dumps({
              "abgerufen_am": datetime.now().isoformat(),
              "daten": ergebnisse
          }, ensure_ascii=False, indent=2)

          print(output)

          msg = MIMEText(output, "plain", "utf-8")
          msg["Subject"] = "[limmat-temp] Temperaturdaten"
          msg["From"] = os.environ["SENDGRID_FROM_EMAIL"]
          msg["To"] = "d.klier@gebana.com"

          with smtplib.SMTP_SSL("smtp.sendgrid.net", 465) as server:
              server.login("apikey", os.environ["SENDGRID_API_KEY"])
              server.send_message(msg)

          print("✅ Email gesendet.")
          EOF
