name: Fetch Limmat Temperature

on:
  schedule:
    - cron: '0 8 * * *'  # 10:00 Uhr CEST (UTC+2, Mai–Sep)
  workflow_dispatch:      # manueller Start möglich

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python LimmatTempFetcher.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add limmat_temp.json
          git diff --cached --quiet || git commit -m "Update limmat_temp.json"
          git push

      - name: Send JSON via email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          username: ${{ secrets.SENDGRID_FROM_EMAIL }}
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "[limmat-temp] Temperaturdaten"
          to: d.klier@gebana.com
          from: ${{ secrets.SENDGRID_FROM_EMAIL }}
          body: file://limmat_temp.json
          content_type: text/plain
