name: Fetch Limmat Temperature

on:
  schedule:
    - cron: '0 8 * * *'  # 10:00 Uhr CEST (UTC+2, Mai–Sep)
  workflow_dispatch:      # manueller Start möglich
  push:
    branches: [main]     # temporär zum Testen

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python LimmatTempFetcher.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add limmat_temp.json
          git diff --cached --quiet || git commit -m "Update limmat_temp.json"
          git push

      - name: Send JSON via email
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
        run: |
          python3 - << 'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          with open("limmat_temp.json") as f:
              body = f.read()
          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = "[limmat-temp] Temperaturdaten"
          msg["From"] = os.environ["SENDGRID_FROM_EMAIL"]
          msg["To"] = "d.klier@gebana.com"
          with smtplib.SMTP_SSL("smtp.sendgrid.net", 465) as server:
              server.login("apikey", os.environ["SENDGRID_API_KEY"])
              server.send_message(msg)
          print("✅ Email gesendet.")
          EOF
